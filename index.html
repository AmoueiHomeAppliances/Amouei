<!DOCTYPE html>
<html lang="fa" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت خدمات پس از فروش عمویی</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="jquery-3.7.1.min.js"></script>
    <script src="persian-date.min.js"></script>
    <script src="persian-datepicker.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;700&display=swap" rel="stylesheet">
    
    <!-- فایل‌های لوکال تقویم شمسی -->
    <link rel="stylesheet" href="persian-datepicker.min.css">
    
    <style>
        body { font-family: 'Vazirmatn', sans-serif; transition: background-color 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* استایل مخصوص چاپ (PDF) */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .glass { background: white !important; border: 1px solid #eee !important; box-shadow: none !important; backdrop-filter: none !important; }
            table { width: 100% !important; border-collapse: collapse !important; }
            th, td { border: 1px solid #ddd !important; padding: 8px !important; font-size: 10pt !important; color: black !important; }
            .print-header { display: block !important; text-align: center; margin-bottom: 20px; }
        }
        .print-header { display: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <nav class="sticky top-0 z-50 glass border-b border-slate-200 dark:border-slate-800 px-6 py-4 flex justify-between items-center no-print">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2.5 rounded-xl shadow-lg shadow-blue-500/20">
                <i data-lucide="wrench" class="text-white w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">مرکز سرویس <span class="text-blue-600">عمویی</span></h1>
                <p class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Amooei Service Center</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                <i data-lucide="moon" id="themeIcon" class="w-5 h-5 text-slate-600 dark:text-slate-400"></i>
            </button>
            <button onclick="openFormForNew()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 text-sm font-bold shadow-lg shadow-blue-500/20">
                <i data-lucide="plus" class="w-4 h-4"></i> ثبت سرویس جدید
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-8">
        <!-- هدر مخصوص نسخه چاپی -->
        <div class="print-header">
            <h1 class="text-2xl font-bold">گزارش خدمات پس از فروش مرکز سرویس عمویی</h1>
            <p id="printDate"></p>
        </div>

        <!-- Stats Section (no-print) -->
        <section class="grid grid-cols-1 md:grid-cols-4 gap-6 no-print">
            <div class="glass p-6 rounded-2xl border border-slate-200 dark:border-slate-800">
                <h3 class="text-slate-500 text-sm font-medium">مجموع کل سرویس‌ها</h3>
                <p class="text-3xl font-bold mt-1" id="stat-total">۰</p>
            </div>
            <div class="glass p-6 rounded-2xl border border-slate-200 dark:border-slate-800">
                <h3 class="text-amber-500 text-sm font-medium">در انتظار اقدام</h3>
                <p class="text-3xl font-bold mt-1" id="stat-pending">۰</p>
            </div>
            <div class="glass p-6 rounded-2xl border border-slate-200 dark:border-slate-800">
                <h3 class="text-green-500 text-sm font-medium">تکمیل شده</h3>
                <p class="text-3xl font-bold mt-1" id="stat-completed">۰</p>
            </div>
            <div class="glass p-6 rounded-2xl border border-slate-200 dark:border-slate-800 flex flex-col justify-center">
                <button onclick="printToPDF()" class="w-full bg-slate-800 text-white dark:bg-white dark:text-slate-900 py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-slate-700 transition-all">
                    <i data-lucide="file-text" class="w-4 h-4"></i> دریافت گزارش (PDF)
                </button>
            </div>
        </section>

        <!-- Table Section -->
        <section class="glass rounded-2xl shadow-xl overflow-hidden border border-slate-200 dark:border-slate-800">
            <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center no-print">
                <h2 class="text-xl font-bold">لیست سوابق خدمات</h2>
                <input type="text" id="searchInput" placeholder="جستجو..." class="px-4 py-2 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 outline-none text-sm w-64">
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse">
                    <thead class="bg-slate-50 dark:bg-slate-900 text-slate-500 text-xs font-bold uppercase">
                        <tr>
                            <th class="px-6 py-4">کد رهگیری</th>
                            <th class="px-6 py-4">مشتری</th>
                            <th class="px-6 py-4">محصول / برند</th>
                            <th class="px-6 py-4">تکنسین</th>
                            <th class="px-6 py-4 text-center">تاریخ</th>
                            <th class="px-6 py-4">وضعیت</th>
                            <th class="px-6 py-4 text-center no-print">عملیات</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="divide-y divide-slate-200 dark:divide-slate-800"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal Form -->
    <div id="serviceModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-950/70 backdrop-blur-sm no-print">
        <div class="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
                <h2 id="modalTitle" class="text-xl font-bold">ثبت سرویس جدید</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500"><i data-lucide="x-circle"></i></button>
            </div>
            
            <form id="serviceForm" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" id="editId">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">نام مشتری</label>
                    <input type="text" id="name" required class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">شماره تماس</label>
                    <input type="text" id="phone" required class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">برند</label>
                    <select id="brand" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
                        <option>استیل البرز</option><option>بیمکث</option><option>اخوان</option><option>درسا</option><option>کن</option><option>متفرقه</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">نوع دستگاه</label>
                    <select id="type" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
                        <option>هود</option><option>اجاق گاز</option><option>فر توکار</option><option>سینک</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">سریال</label>
                    <input type="text" id="serial" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">مدل</label>
                    <input type="text" id="serial" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">تکنسین</label>
                    <input type="text" id="technician" required class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">تاریخ شمسی</label>
                    <input type="text" id="dateInput" readonly class="w-full px-4 py-2 bg-blue-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none cursor-pointer text-blue-600">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">وضعیت</label>
                    <select id="status" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
                        <option value="Pending">در انتظار</option><option value="Completed">تکمیل شده</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">نوع سرویس</label>
                    <select id="status" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none">
                        <option value="Pending">نصب</option><option value="Completed">تعمیر</option>
                    </select>
                </div>
                <div class="md:col-span-2 space-y-1">
                    <label class="text-xs font-bold text-slate-500">آدرس</label>
                    <textarea id="desc" rows="2" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none"></textarea>
                </div>
                <div class="md:col-span-2 space-y-1">
                    <label class="text-xs font-bold text-slate-500">توضیحات</label>
                    <textarea id="desc" rows="2" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl outline-none"></textarea>
                </div>
                <div class="md:col-span-2 pt-4 flex gap-3">
                    <button type="submit" id="submitBtn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">تایید و ذخیره</button>
                    <button type="button" onclick="closeModal()" class="px-8 py-3 rounded-xl bg-slate-100 dark:bg-slate-800">انصراف</button>
                </div>
            </form>
        </div>
    </div>

    <!-- اسکریپت‌ها -->
    <script src="jquery.min.js"></script>
    <script src="persian-date.min.js"></script>
    <script src="persian-datepicker.min.js"></script>

    <script>
        let services = JSON.parse(localStorage.getItem('amooei_db')) || [];

        $(document).ready(function() {
            lucide.createIcons();
            $('#dateInput').persianDatepicker({
                format: 'YYYY/MM/DD',
                autoClose: true,
                initialValue: true,
                initialValueType: 'persian'
            });
            renderTable();
            updateStats();
        });

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            lucide.createIcons();
        }

        function openFormForNew() {
            document.getElementById('serviceForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('modalTitle').innerText = 'ثبت سرویس جدید';
            document.getElementById('submitBtn').innerText = 'تایید و ثبت نهایی';
            document.getElementById('serviceModal').classList.remove('hidden');
            document.getElementById('serviceModal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('serviceModal').classList.add('hidden');
        }

        // ثبت یا ویرایش
        document.getElementById('serviceForm').onsubmit = function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            
            const data = {
                id: editId || 'AS-' + Math.floor(10000 + Math.random() * 90000),
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                brand: document.getElementById('brand').value,
                type: document.getElementById('type').value,
                serial: document.getElementById('serial').value,
                technician: document.getElementById('technician').value,
                date: document.getElementById('dateInput').value,
                status: document.getElementById('status').value,
                desc: document.getElementById('desc').value
            };

            if (editId) {
                const index = services.findIndex(s => s.id === editId);
                services[index] = data;
            } else {
                services.unshift(data);
            }

            localStorage.setItem('amooei_db', JSON.stringify(services));
            closeModal();
            renderTable();
            updateStats();
        };

        function editService(id) {
            const item = services.find(s => s.id === id);
            if (!item) return;

            document.getElementById('editId').value = item.id;
            document.getElementById('name').value = item.name;
            document.getElementById('phone').value = item.phone;
            document.getElementById('brand').value = item.brand;
            document.getElementById('type').value = item.type;
            document.getElementById('serial').value = item.serial;
            document.getElementById('technician').value = item.technician;
            document.getElementById('dateInput').value = item.date;
            document.getElementById('status').value = item.status;
            document.getElementById('desc').value = item.desc;

            document.getElementById('modalTitle').innerText = 'ویرایش اطلاعات سرویس';
            document.getElementById('submitBtn').innerText = 'به‌روزرسانی تغییرات';
            document.getElementById('serviceModal').classList.remove('hidden');
            document.getElementById('serviceModal').classList.add('flex');
        }

        function deleteService(id) {
            if(confirm('آیا این رکورد حذف شود؟')) {
                services = services.filter(s => s.id !== id);
                localStorage.setItem('amooei_db', JSON.stringify(services));
                renderTable();
                updateStats();
            }
        }

        function renderTable(data = null) {
            const tbody = document.getElementById('dataTableBody');
            const items = data || services;
            tbody.innerHTML = '';
            
            items.forEach(item => {
                const statusColor = item.status === 'Completed' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700';
                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors group">
                        <td class="px-6 py-4 font-bold text-blue-600 text-xs">${item.id}</td>
                        <td class="px-6 py-4 text-sm font-bold">${item.name}</td>
                        <td class="px-6 py-4 text-xs">${item.brand} / ${item.type}</td>
                        <td class="px-6 py-4 text-sm">${item.technician}</td>
                        <td class="px-6 py-4 text-xs text-center">${item.date}</td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold ${statusColor}">
                                ${item.status === 'Completed' ? 'تکمیل شده' : 'در انتظار'}
                            </span>
                        </td>
                        <td class="px-6 py-4 no-print">
                            <div class="flex justify-center gap-1">
                                <button onclick="editService('${item.id}')" class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="alert('توضیحات: ${item.desc}')" class="p-2 text-slate-400 hover:bg-slate-100 rounded-lg"><i data-lucide="eye" class="w-4 h-4"></i></button>
                                <button onclick="deleteService('${item.id}')" class="p-2 text-red-500 hover:bg-red-50 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </td>
                    </tr>
                `);
            });
            lucide.createIcons();
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = services.length.toLocaleString('fa-IR');
            document.getElementById('stat-pending').innerText = services.filter(s => s.status === 'Pending').length.toLocaleString('fa-IR');
            document.getElementById('stat-completed').innerText = services.filter(s => s.status === 'Completed').length.toLocaleString('fa-IR');
        }

        // جستجو
        document.getElementById('searchInput').oninput = function(e) {
            const val = e.target.value.toLowerCase();
            const filtered = services.filter(s => s.name.toLowerCase().includes(val) || s.id.toLowerCase().includes(val));
            renderTable(filtered);
        };

        // خروجی PDF
        function printToPDF() {
            document.getElementById('printDate').innerText = 'تاریخ گزارش: ' + new persianDate().format('YYYY/MM/DD');
            window.print();
        }
    </script>
</body>
</html>
